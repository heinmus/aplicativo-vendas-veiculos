name: myapp
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^16.2.4

  # Gerenciamento de Estado (Requisito 1)
  provider: ^6.1.1 
  
  # Persistência de sessão simples (Requisito 2)
