  # Acesso a pastas para salvar arquivos locais (Requisito 3 - Sem BD)
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/

